<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seteos Logísticos - Portal Bosque</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --header-bg: #3a4d4a;
            --filter-bg: #e9e9b3;
            --text-dark: #333;
            --border-color: #000;
            --badge-bg: #52635f;
            --success-color: #28a745;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; background-color: #fff; color: var(--text-dark);
        }

        .main-header {
            background-color: var(--header-bg);
            color: white; padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo-section { display: flex; align-items: center; gap: 15px; }
        .brand-name { font-size: 24px; line-height: 1; text-transform: uppercase; font-weight: bold; margin: 0; }
        .brand-name span { font-weight: normal; }
        .title-section { text-align: right; }
        .title-section h2 { margin: 0; font-size: 20px; }
        .title-section p { margin: 0; opacity: 0.9; }

        .filters-bar {
            background-color: var(--filter-bg);
            padding: 15px 40px;
            display: flex; flex-wrap: wrap; gap: 20px; align-items: center;
        }

        .filter-group { display: flex; align-items: center; gap: 10px; }
        .filter-group label { font-weight: bold; font-size: 16px; }

        .filter-group select {
            padding: 6px 12px; border-radius: 20px; border: 1px solid #ccc;
            background: white; min-width: 130px;
        }

        .table-container { padding: 20px 40px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }

        thead tr {
            display: flex; justify-content: space-between;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px; margin-bottom: 10px;
        }

        th {
            background-color: var(--badge-bg); color: white;
            padding: 10px 15px; border-radius: 20px;
            font-size: 14px; text-align: center; flex: 1; margin: 0 5px;
        }

        tbody tr {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #eee; transition: 0.3s;
        }

        tbody tr.completed { background-color: #f9f9f9; opacity: 0.4; }
        tbody tr.completed td { text-decoration: line-through; }

        td { padding: 15px 10px; flex: 1; font-size: 14px; margin: 0 5px; }

        .bold { font-weight: bold; }
        .uppercase { text-transform: uppercase; }
        .text-small { font-size: 13px; line-height: 1.4; }
        
        .badge {
            background-color: var(--badge-bg); color: white;
            padding: 4px 10px; border-radius: 4px; font-size: 11px;
        }

        .check-btn {
            width: 25px; height: 25px; border-radius: 50%;
            border: 2px solid var(--badge-bg); background: white;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        tr.completed .check-btn { background: var(--success-color); border-color: var(--success-color); }
