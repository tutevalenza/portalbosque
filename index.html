<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Bosque — Seteos Logísticos</title>

<style>
body { font-family: sans-serif; padding: 20px; }
select, input { padding: 6px; margin: 5px; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
td, th { border: 1px solid #ccc; padding: 8px; }
</style>
</head>

<body>

<h2>Portal Bosque</h2>

<select id="sel-dia" onchange="render()">
  <option value="">Todos</option>
</select>

<input id="inp-resp" placeholder="Responsable" oninput="render()">
<input id="inp-esp" placeholder="Espacio" oninput="render()">

<table>
<thead>
<tr>
<th>Día</th>
<th>Responsable</th>
<th>Horario</th>
<th>Espacio</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQAjbZFpNcEopTvKwlp2Nn6EpFWNPAf3hMK0vc_NRM5K3NhSTe73DsHUjEV3YjKGWT4auUjQ3kXpucf/pub?output=csv';

let ALL_DATA = [];

const DIAS_ORDER = ['LUNES','MARTES','MIERCOLES','JUEVES','VIERNES','SABADO','DOMINGO'];

const DIAS_LABEL = {
  LUNES: "Lunes",
  MARTES: "Martes",
  MIERCOLES: "Miércoles",
  JUEVES: "Jueves",
  VIERNES: "Viernes",
  SABADO: "Sábado",
  DOMINGO: "Domingo"
};

function normalizar(s) {
  return (s || '')
    .toUpperCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '');
}

function parseCSV(text) {
  const lines = text.split('\n');
  let lastDia = '';

  return lines.slice(1).map(line => {
    const cols = line.split(',');
    let [dia, resp, horario, espacio] = cols;

    dia = dia || lastDia;
    lastDia = dia;

    return {
      dia,
      diaNorm: normalizar(dia),
      resp,
      horario,
      espacio
    };
  }).filter(r => r.espacio);
}

async function fetchData() {
  const res = await fetch(CSV_URL);
  const text = await res.text();

  ALL_DATA = parseCSV(text);

  const diasEnDatos = new Set(ALL_DATA.map(r => r.diaNorm));

  const sel = document.getElementById('sel-dia');
  sel.innerHTML = '<option value="">Todos</option>';

  DIAS_ORDER.forEach(d => {
    if (!diasEnDatos.has(d)) return;

    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = DIAS_LABEL[d];
    sel.appendChild(opt);
  });

  render();
}

function render() {
  const dia = normalizar(document.getElementById('sel-dia').value);
  const resp = document.getElementById('inp-resp').value.toLowerCase();
  const esp = document.getElementById('inp-esp').value.toLowerCase();

  let filtered = ALL_DATA.filter(r => {
    if (dia && r.diaNorm !== dia) return false;
    if (resp && !r.resp.toLowerCase().includes(resp)) return false;
    if (esp && !r.espacio.toLowerCase().includes(esp)) return false;
    return true;
  });

  // 🔥 ORDEN POR DÍA + HORARIO
  filtered.sort((a, b) => {
    const diaDiff = DIAS_ORDER.indexOf(a.diaNorm) - DIAS_ORDER.indexOf(b.diaNorm);
    if (diaDiff !== 0) return diaDiff;
    return (a.horario || '').localeCompare(b.horario || '');
  });

  const tbody = document.getElementById('tbody');

  tbody.innerHTML = filtered.map(r => `
    <tr>
      <td>${DIAS_LABEL[r.diaNorm]}</td>
      <td>${r.resp}</td>
      <td>${r.horario}</td>
      <td>${r.espacio}</td>
    </tr>
  `).join('');
}

fetchData();
</script>

</body>
</html>
