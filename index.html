<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Bosque — Seteos Logísticos</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=DM+Sans&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'DM Sans', sans-serif;
  background: #f7f5f0;
  padding: 20px;
}

h2 {
  margin-bottom: 10px;
}

.controls {
  margin-bottom: 15px;
}

select, input {
  padding: 6px 10px;
  margin-right: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
  font-size: 13px;
}

th {
  background: #f0ede6;
  text-align: left;
  font-size: 11px;
  text-transform: uppercase;
}

tr:hover {
  background: #f9f7f2;
}
</style>
</head>

<body>

<h2>Portal Bosque — Seteos Logísticos</h2>

<div class="controls">
  <select id="sel-dia"></select>
  <input id="inp-resp" placeholder="Responsable">
  <input id="inp-esp" placeholder="Espacio">
</div>

<table>
<thead>
<tr>
<th>Día</th>
<th>Responsable</th>
<th>Horario</th>
<th>Espacio</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQAjbZFpNcEopTvKwlp2Nn6EpFWNPAf3hMK0vc_NRM5K3NhSTe73DsHUjEV3YjKGWT4auUjQ3kXpucf/pub?output=csv';

const DIAS_ORDER = ['LUNES','MARTES','MIERCOLES','JUEVES','VIERNES','SABADO','DOMINGO'];

const DIAS_LABEL = {
  LUNES: "Lunes",
  MARTES: "Martes",
  MIERCOLES: "Miércoles",
  JUEVES: "Jueves",
  VIERNES: "Viernes",
  SABADO: "Sábado",
  DOMINGO: "Domingo"
};

let DATA = [];

function normalizar(s) {
  return (s || '')
    .toString()
    .trim()
    .toUpperCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '');
}

// convierte horarios a formato comparable
function normalizarHora(h) {
  if (!h) return "99:99";

  h = h.replace(/\s/g, "");

  if (h.includes(":")) {
    let [hh, mm] = h.split(":");
    return hh.padStart(2,'0') + ":" + (mm || "00").padStart(2,'0');
  }

  if (h.length === 3) {
    return "0" + h[0] + ":" + h.slice(1);
  }

  if (h.length === 4) {
    return h.slice(0,2) + ":" + h.slice(2);
  }

  return "99:99";
}

async function init() {
  const res = await fetch(CSV_URL);
  const text = await res.text();

  DATA = text.split('\n').slice(1).map(line => {
    const cols = line.split(',');

    return {
      diaNorm: normalizar(cols[0]),
      resp: (cols[1] || '').trim(),
      horario: (cols[2] || '').trim(),
      horarioSort: normalizarHora(cols[2] || ''),
      espacio: (cols[3] || '').trim()
    };
  }).filter(r => r.espacio);

  construirDropdown();
  render();
}

function construirDropdown() {
  const sel = document.getElementById('sel-dia');

  sel.innerHTML = '<option value="">Todos los días</option>';

  DIAS_ORDER.forEach(d => {
    if (DATA.some(r => r.diaNorm === d)) {
      const opt = document.createElement('option');
      opt.value = d;
      opt.textContent = DIAS_LABEL[d];
      sel.appendChild(opt);
    }
  });
}

function render() {
  const dia = normalizar(document.getElementById('sel-dia').value);
  const resp = document.getElementById('inp-resp').value.toLowerCase();
  const esp = document.getElementById('inp-esp').value.toLowerCase();

  let filtrado = DATA.filter(r => {
    if (dia && r.diaNorm !== dia) return false;
    if (resp && !r.resp.toLowerCase().includes(resp)) return false;
    if (esp && !r.espacio.toLowerCase().includes(esp)) return false;
    return true;
  });

  // ORDEN PERFECTO
  filtrado.sort((a, b) => {
    const d = DIAS_ORDER.indexOf(a.diaNorm) - DIAS_ORDER.indexOf(b.diaNorm);
    if (d !== 0) return d;
    return a.horarioSort.localeCompare(b.horarioSort);
  });

  const tbody = document.getElementById('tbody');

  tbody.innerHTML = filtrado.map(r => `
    <tr>
      <td>${DIAS_LABEL[r.diaNorm]}</td>
      <td>${r.resp}</td>
      <td>${r.horario}</td>
      <td>${r.espacio}</td>
    </tr>
  `).join('');
}

document.getElementById('sel-dia').onchange = render;
document.getElementById('inp-resp').oninput = render;
document.getElementById('inp-esp').oninput = render;

init();
</script>

</body>
</html>
